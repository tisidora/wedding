<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Исидора & Ђорђе</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>

/* ===================== VARIABLES ===================== */
:root{
  --gold:#c8a97a;
  --dark-gold:#b8935f;
  --wine1:#4b0f12;
  --wine2:#7b141a;
  --bg:#faf7f1;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  overflow-x:hidden;
}

/* ===================== CURTAIN ===================== */
#curtain-wrapper{
  position:fixed;
  inset:0;
  display:flex;
  z-index:9999;
  cursor:pointer;
}

.curtain{
  width:50%;
  height:100%;
  background:
    repeating-linear-gradient(
      90deg,
      #5b0f14 0px,
      #7a141a 40px,
      #5b0f14 80px
    );
  box-shadow:inset -30px 0 60px rgba(0,0,0,.7);
  transition:transform 1.8s cubic-bezier(.77,0,.18,1);
  position:relative;
}

.curtain.right{
  box-shadow:inset 30px 0 60px rgba(0,0,0,.7);
}

#curtain-wrapper.open .left{transform:translateX(-100%)}
#curtain-wrapper.open .right{transform:translateX(100%)}

/* ===================== PARTICLES ===================== */
#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:5000;
}

/* ===================== HERO ===================== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url("images/hero.jpg") center/cover no-repeat;
  position:relative;
  color:white;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
}

.hero-content{
  position:relative;
  z-index:2;
  opacity:0;
  transform:translateY(40px);
  transition:all 1.5s ease;
}

.hero-content.reveal{
  opacity:1;
  transform:translateY(0);
}

.monogram{
  font-family:'Cormorant Garamond',serif;
  font-size:110px;
  font-style:italic;
  letter-spacing:20px;
  color:#f5d9a4;
}

.hero h1{
  font-family:'Cinzel',serif;
  font-size:26px;
  letter-spacing:8px;
  margin:20px 0;
}

.hero-sub{
  letter-spacing:4px;
  font-size:12px;
  opacity:.8;
}

/* ===================== SCRATCH SECTION ===================== */
section{
  padding:120px 20px;
  text-align:center;
}

h2{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;
  font-style:italic;
  margin-bottom:60px;
}

.scratch-grid{
  display:flex;
  flex-wrap:wrap;
  gap:60px;
  justify-content:center;
}

.scratch-card{
  width:220px;
  height:220px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,#d4b07a,#b8935f);
  box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.scratch-content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  padding:20px;
  z-index:1;
}

.scratch-time{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;
  margin-bottom:10px;
}

.scratch-card canvas{
  position:absolute;
  inset:0;
  border-radius:50%;
  z-index:2;
}

</style>
</head>
<body>

<!-- ================= CURTAINS ================= -->
<div id="curtain-wrapper">
  <div class="curtain left"></div>
  <div class="curtain right"></div>
</div>

<canvas id="particles"></canvas>

<!-- ================= HERO ================= -->
<div class="hero">
  <div class="hero-content">
    <div class="monogram">И & Ђ</div>
    <h1>Исидора & Ђорђе</h1>
    <div class="hero-sub">19. септембар 2026 · Крагујевац</div>
  </div>
</div>

<!-- ================= SCRATCH TIMELINE ================= -->
<section>
  <h2>Детаљи и сатница</h2>

  <div class="scratch-grid">

    <div class="scratch-card">
      <div class="scratch-content">
        <div class="scratch-time">10:00</div>
        Скуп сватова<br>Дом породице Мирковић
      </div>
      <canvas></canvas>
    </div>
    
   <div class="scratch-card">
     <div class="scratch-content">
       <div class="scratch-time">11:00</div>
        Скуп сватова<br>Дом породице Топаловић
      </div>
      <canvas></canvas>
    </div>
    
    <div class="scratch-card">
      <div class="scratch-content">
        <div class="scratch-time">13:30</div>
        Црквено венчање<br>Стара Црква
      </div>
      <canvas></canvas>
    </div>

    <div class="scratch-card">
     <div class="scratch-content">
        <div class="scratch-time">16:00</div>
        Свечани ручак<br>Woodland Resort
      </div>
      <canvas></canvas>
    </div>
    
    <div class="scratch-card">
     <div class="scratch-content">
        <div class="scratch-time">17:30</div>
        Грађанско венчање<br>Woodland Resort
      </div>
      <canvas></canvas>
    </div>
    
  </div>
</section>

<script>

/* ================= CURTAIN OPEN ================= */
const curtain=document.getElementById("curtain-wrapper");
const heroContent=document.querySelector(".hero-content");

curtain.addEventListener("click",()=>{
  curtain.classList.add("open");
  heroContent.classList.add("reveal");
  launchParticles();
  setTimeout(()=>curtain.style.display="none",2000);
});

/* ================= PARTICLES ================= */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function launchParticles(){
  let particles=[];
  for(let i=0;i<120;i++){
    particles.push({
      x:canvas.width/2,
      y:canvas.height/2,
      dx:(Math.random()-0.5)*8,
      dy:(Math.random()-0.5)*8,
      size:Math.random()*4+2,
      life:100
    });
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.dx;
      p.y+=p.dy;
      p.life--;
      ctx.fillStyle="rgba(212,175,122,"+(p.life/100)+")";
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    });
    particles=particles.filter(p=>p.life>0);
    if(particles.length>0)requestAnimationFrame(animate);
  }
  animate();
}

/* ================= SCRATCH EFFECT ================= */
document.querySelectorAll(".scratch-card").forEach(card=>{
  const canvas=card.querySelector("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=card.offsetWidth;
  canvas.height=card.offsetHeight;

  ctx.fillStyle="#c8a97a";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.globalCompositeOperation="destination-out";

  let isDown=false;

  function scratch(e){
    if(!isDown)return;
    const rect=canvas.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    ctx.beginPath();
    ctx.arc(x,y,18,0,Math.PI*2);
    ctx.fill();
  }

  canvas.addEventListener("mousedown",()=>isDown=true);
  canvas.addEventListener("mouseup",()=>isDown=false);
  canvas.addEventListener("mousemove",scratch);

  canvas.addEventListener("touchstart",()=>isDown=true);
  canvas.addEventListener("touchend",()=>isDown=false);
  canvas.addEventListener("touchmove",scratch);
});

</script>

</body>
</html>
