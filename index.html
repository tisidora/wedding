<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Исидора & Ђорђе</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>

/* ================= VARIABLES ================= */
:root{
  --gold:#c8a97a;
  --dark-gold:#b8935f;
  --wine1:#4b0f12;
  --wine2:#7b141a;
  --bg:#faf7f1;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  overflow-x:hidden;
}

/* ================= CURTAIN ================= */
#curtain-wrapper{
  position:fixed;
  inset:0;
  display:flex;
  z-index:9999;
  cursor:pointer;
  overflow:hidden;
}

.curtain{
  width:50%;
  height:100%;
  background:
    repeating-linear-gradient(
      90deg,
      #5b0f14 0px,
      #7a141a 40px,
      #5b0f14 80px
    );
  box-shadow:inset 0 0 120px rgba(0,0,0,.6);
  transition:transform 2.4s cubic-bezier(.77,0,.18,1);
}

#curtain-wrapper.open .left{
  transform:translateX(-110%) rotate(-8deg);
}
#curtain-wrapper.open .right{
  transform:translateX(110%) rotate(8deg);
}

/* splash light */
#splash{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(255,230,180,.9) 0%, rgba(255,230,180,.4) 30%, transparent 60%);
  opacity:0;
  pointer-events:none;
  z-index:9998;
  transition:opacity 1.2s ease;
}

#splash.active{
  opacity:1;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url("images/hero.jpg") center/cover no-repeat;
  position:relative;
  color:white;
  transform:scale(1.1);
  transition:transform 2s ease;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.65);
}

.hero.reveal{
  transform:scale(1);
}

.hero-content{
  position:relative;
  z-index:2;
  opacity:0;
  transform:translateY(50px);
  transition:all 1.8s ease;
}

.hero-content.reveal{
  opacity:1;
  transform:translateY(0);
}

.monogram{
  font-family:'Cormorant Garamond',serif;
  font-size:110px;
  font-style:italic;
  letter-spacing:20px;
  color:var(--gold);
  text-shadow:0 0 40px rgba(0,0,0,.6);
}

.hero h1{
  font-size:42px;
  color:#fff;
  text-shadow:0 3px 25px rgba(0,0,0,.8);
  margin-bottom:10px;
}

/* ================= GOLD PARTICLES ================= */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:var(--gold);
  border-radius:50%;
  opacity:.8;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh) scale(.5);opacity:0}
  30%{opacity:.8}
  to{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ================= SECTIONS ================= */
section{
  padding:120px 20px;
  text-align:center;
}

h2{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;
  font-style:italic;
  margin-bottom:60px;
}

/* ================= RSVP FORM ================= */
.rsvp-form{
  max-width:500px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.rsvp-form input,
.rsvp-form select{
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:15px;
}

.rsvp-form button{
  padding:14px;
  background:var(--gold);
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
  transition:.3s;
}

.rsvp-form button:hover{
  background:var(--dark-gold);
}

.success-msg{
  display:none;
  margin-top:15px;
  color:green;
}

</style>
</head>
<body>

<div id="curtain-wrapper">
  <div class="curtain left"></div>
  <div class="curtain right"></div>
</div>

<div id="splash"></div>

<div class="hero">
  <div class="hero-content">
    <div class="monogram">И & Ђ</div>
    <h1>Исидора & Ђорђе</h1>
    <div>19. септембар 2026 · Крагујевац</div>
    <br>
    <a href="https://www.google.com/maps/place/Woodland+Resort/" target="_blank" style="color:var(--gold);text-decoration:none;font-weight:500;">
      📍 Погледај локацију
    </a>
  </div>
</div>

<section>
<h2>RSVP</h2>

<form class="rsvp-form" id="rsvpForm">
  <input type="text" placeholder="Име и презиме" required>
  <select required>
    <option value="">Да ли долазите?</option>
    <option>Долазим</option>
    <option>Нажалост не долазим</option>
  </select>
  <input type="number" placeholder="Број особа">
  <button type="submit">Пошаљи</button>
</form>

<div class="success-msg" id="successMsg">
  Хвала Вам! Ваш одговор је забележен.
</div>

</section>

<script>

/* Curtain cinematic open */
const curtain=document.getElementById("curtain-wrapper");
const hero=document.querySelector(".hero");
const heroContent=document.querySelector(".hero-content");
const splash=document.getElementById("splash");

curtain.addEventListener("click",()=>{
  curtain.classList.add("open");
  splash.classList.add("active");

  setTimeout(()=>{
    hero.classList.add("reveal");
    heroContent.classList.add("reveal");
  },800);

  setTimeout(()=>{
    splash.style.opacity="0";
  },1600);

  setTimeout(()=>{
    curtain.style.display="none";
  },2500);

  createParticles();
});

/* gold particles */
function createParticles(){
  for(let i=0;i<25;i++){
    const p=document.createElement("div");
    p.classList.add("particle");
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(4+Math.random()*4)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
  }
}

/* RSVP fake submit */
document.getElementById("rsvpForm").addEventListener("submit",function(e){
  e.preventDefault();
  document.getElementById("successMsg").style.display="block";
  this.reset();
});

</script>

</body>
</html>
