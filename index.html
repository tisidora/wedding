<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root{
  --crimson:    #6b0d12;
  --crimson-dk: #450a0d;
  --crimson-lt: #9b1a20;
  --gold:       #c9a55a;
  --gold-lt:    #e8c97a;
  --gold-pale:  #f5e4b0;
  --cream:      #fdf8ef;
  --ink:        #1a1008;
  --velvet:     #3a0a0e;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  font-family:'Jost',sans-serif;
  font-weight:300;
  background:var(--ink);
  color:var(--cream);
  overflow-x:hidden;
  cursor:default;
}

/* ═══════════════════════════════════════════
   STAGE LIGHTS  — fixed ambient top glow
═══════════════════════════════════════════ */
#stage-lights{
  position:fixed;
  top:0; left:0; width:100%; height:260px;
  pointer-events:none;
  z-index:10;
  background:
    radial-gradient(ellipse 180px 180px at 12% 0%, rgba(201,165,90,.18) 0%, transparent 70%),
    radial-gradient(ellipse 180px 180px at 38% 0%, rgba(201,165,90,.12) 0%, transparent 70%),
    radial-gradient(ellipse 180px 180px at 62% 0%, rgba(201,165,90,.12) 0%, transparent 70%),
    radial-gradient(ellipse 180px 180px at 88% 0%, rgba(201,165,90,.18) 0%, transparent 70%);
  animation: lightsway 8s ease-in-out infinite alternate;
}
@keyframes lightsway{
  from{opacity:.7}
  to  {opacity:1}
}

/* ═══════════════════════════════════════════
   PARTICLES CANVAS
═══════════════════════════════════════════ */
#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:8000;
}

/* ═══════════════════════════════════════════
   CURTAIN SPLASH
═══════════════════════════════════════════ */
#curtain-wrap{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  flex-direction:column;
  transition: opacity 1s ease 2.6s, visibility 1s ease 2.6s;
}
#curtain-wrap.open{
  opacity:0;
  visibility:hidden;
}
/* velvet curtains */
.curtain{
  position:absolute;
  top:0;
  width:51%;
  height:100%;
  overflow:hidden;
  transition: transform 3s cubic-bezier(.6,0,.1,1);
  will-change:transform;
}
.curtain.left { left:0; transform-origin:left center; }
.curtain.right{ right:0; transform-origin:right center; }

#curtain-wrap.open .curtain.left { transform:translateX(-102%); }
#curtain-wrap.open .curtain.right{ transform:translateX(102%); }

.curtain-body{
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      90deg,
      var(--crimson-dk)   0px,
      var(--crimson)      18px,
      #821219             36px,
      var(--crimson)      54px,
      var(--crimson-dk)   72px
    );
}
/* fabric folds shadow */
.curtain.left  .curtain-body{ box-shadow:inset -60px 0 90px rgba(0,0,0,.7), inset 0 0 60px rgba(0,0,0,.4); }
.curtain.right .curtain-body{ box-shadow:inset  60px 0 90px rgba(0,0,0,.7), inset 0 0 60px rgba(0,0,0,.4); }

/* swag pelmet across top */
.curtain-swag{
  position:absolute;
  top:0; left:0; right:0;
  height:110px;
  background:var(--crimson-dk);
  z-index:2;
  overflow:hidden;
}
.curtain-swag::before{
  content:'';
  position:absolute;
  bottom:-1px; left:-5%; width:110%;
  height:100%;
  background:
    radial-gradient(ellipse 130px 80px at 15% 110%,  var(--crimson) 40%, transparent 70%),
    radial-gradient(ellipse 130px 80px at 40% 110%,  var(--crimson) 40%, transparent 70%),
    radial-gradient(ellipse 130px 80px at 65% 110%,  var(--crimson) 40%, transparent 70%),
    radial-gradient(ellipse 130px 80px at 90% 110%,  var(--crimson) 40%, transparent 70%);
  border-bottom: 3px solid var(--gold);
}
/* gold braid on swag */
.curtain-swag::after{
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:4px;
  background: linear-gradient(90deg,
    var(--gold-lt), var(--gold), var(--gold-pale), var(--gold), var(--gold-lt));
  box-shadow: 0 0 12px var(--gold);
}

/* gold tassel left & right */
.tassel{
  position:absolute;
  top:90px;
  width:18px;
  z-index:3;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.tassel.tl{ left:calc(50% - 80px); }
.tassel.tr{ right:calc(50% - 80px); }
.tassel-rope{
  width:3px;
  height:60px;
  background:linear-gradient(to bottom, var(--gold), var(--gold-lt));
  border-radius:2px;
}
.tassel-head{
  width:18px; height:18px;
  border-radius:50%;
  background:radial-gradient(circle at 40% 35%, var(--gold-pale), var(--gold-dk,#9a7040));
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.tassel-fringe{
  display:flex;
  gap:2px;
  margin-top:2px;
}
.tassel-fringe span{
  width:2px;
  height:28px;
  background:linear-gradient(to bottom, var(--gold), transparent);
  border-radius:1px;
  animation:sway 2.5s ease-in-out infinite;
}
.tassel-fringe span:nth-child(2){ animation-delay:.15s; }
.tassel-fringe span:nth-child(3){ animation-delay:.3s; }
.tassel-fringe span:nth-child(4){ animation-delay:.15s; }
@keyframes sway{
  0%,100%{transform:rotate(-4deg)}
  50%    {transform:rotate(4deg)}
}

/* centre text on curtain */
#curtain-center{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:4;
  pointer-events:none;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
#curtain-center.dismiss{
  opacity:0;
  transform:translate(-50%,-58%) scale(0.85);
  pointer-events:none;
}
#curtain-center .mono{
  font-family:'Cinzel Decorative',serif;
  font-size:72px;
  color:var(--gold-lt);
  text-shadow:0 0 40px rgba(201,165,90,.6), 0 2px 4px rgba(0,0,0,.8);
  line-height:1;
  margin-bottom:16px;
  animation: goldglow 3s ease-in-out infinite alternate;
}
@keyframes goldglow{
  from{text-shadow:0 0 30px rgba(201,165,90,.5), 0 2px 4px rgba(0,0,0,.8)}
  to  {text-shadow:0 0 70px rgba(201,165,90,.9), 0 0 120px rgba(201,165,90,.3), 0 2px 4px rgba(0,0,0,.8)}
}
#curtain-center .sub{
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:rgba(245,228,176,.7);
  margin-bottom:40px;
}
#open-btn{
  display:inline-block;
  border:1px solid var(--gold);
  color:var(--gold-lt);
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:5px;
  text-transform:uppercase;
  padding:14px 40px;
  cursor:pointer;
  pointer-events:all;
  position:relative;
  overflow:hidden;
  transition:color .3s;
}
#open-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:var(--gold);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .4s ease;
  z-index:-1;
}
#open-btn:hover::before{ transform:scaleX(1); }
#open-btn:hover{ color:var(--ink); }

/* ═══════════════════════════════════════════
   GLOBAL SECTION DECORATION
═══════════════════════════════════════════ */
section{
  padding:120px 24px;
  position:relative;
  overflow:hidden;
}

/* Decorative side borders */
section::before, section::after{
  content:'';
  position:absolute;
  top:0; bottom:0;
  width:5px;
  background:linear-gradient(to bottom,
    transparent 0%,
    var(--gold) 20%,
    var(--gold) 80%,
    transparent 100%);
  opacity:.18;
}
section::before{ left:0; }
section::after { right:0; }

/* Scroll-reveal base */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition: opacity .9s ease, transform .9s ease;
}
.reveal.in-view{
  opacity:1;
  transform:translateY(0);
}

/* ═══════════════════════════════════════════
   SECTION LABELS + H2
═══════════════════════════════════════════ */
.act-label{
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:var(--gold);
  opacity:.65;
  text-align:center;
  margin-bottom:10px;
}
h2{
  font-family:'Playfair Display',serif;
  font-size:52px;
  font-weight:700;
  font-style:italic;
  text-align:center;
  color:var(--cream);
  margin-bottom:14px;
  line-height:1.1;
}
.sep{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  margin:0 auto 70px;
  max-width:420px;
}
.sep-line{
  flex:1; height:1px;
  background:linear-gradient(to right, transparent, var(--gold));
  opacity:.5;
}
.sep-line:last-child{
  background:linear-gradient(to left, transparent, var(--gold));
}
.sep-diamond{
  width:7px; height:7px;
  background:var(--gold);
  transform:rotate(45deg);
  opacity:.7;
}

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero{
  height:100vh;
  min-height:640px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}
.hero-bg{
  position:absolute;
  inset:-24px;
  background:url('images/hero.jpg') center/cover no-repeat;
  filter:blur(3px) brightness(.55) saturate(.8);
  transform:scale(1.06);
  animation:heroZoom 22s ease-in-out infinite alternate;
}
@keyframes heroZoom{
  from{transform:scale(1.06)}
  to  {transform:scale(1.12)}
}
.hero-vignette{
  position:absolute; inset:0;
  background:radial-gradient(ellipse at center,
    rgba(10,4,2,.2) 30%,
    rgba(10,4,2,.75) 100%);
}
.hero-content{
  position:relative;
  z-index:2;
  opacity:0;
  transform:translateY(40px) scale(.98);
  transition: opacity 2s cubic-bezier(.22,.8,.36,1), transform 2s cubic-bezier(.22,.8,.36,1);
}
.hero-content.visible{
  opacity:1;
  transform:translateY(0) scale(1);
}
/* stagger child elements */
.hero-content.visible .hero-program    { animation: staggerIn .8s .1s both ease; }
.hero-content.visible .monogram        { animation: staggerIn 1s .25s both ease; }
.hero-content.visible .hero h1,
.hero-content.visible h1               { animation: staggerIn .9s .45s both ease; }
.hero-content.visible .hero-rule       { animation: staggerIn .8s .6s both ease; }
.hero-content.visible .hero-sub        { animation: staggerIn .8s .72s both ease; }
.hero-content.visible .countdown-wrap  { animation: staggerIn .9s .88s both ease; }
@keyframes staggerIn{
  from{ opacity:0; transform:translateY(18px); }
  to  { opacity:1; transform:translateY(0); }
}

/* Spotlight circle behind monogram */
.spotlight{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-60%);
  width:500px; height:500px;
  background:radial-gradient(circle at center,
    rgba(201,165,90,.08) 0%,
    rgba(201,165,90,.04) 40%,
    transparent 70%);
  border-radius:50%;
  pointer-events:none;
  animation: spotpulse 4s ease-in-out infinite alternate;
}
@keyframes spotpulse{
  from{opacity:.6; transform:translate(-50%,-60%) scale(1)}
  to  {opacity:1;  transform:translate(-50%,-60%) scale(1.1)}
}

.hero-program{
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:7px;
  text-transform:uppercase;
  color:rgba(245,228,176,.65);
  margin-bottom:30px;
}
.monogram{
  font-family:'Cinzel Decorative',serif;
  font-size:100px;
  line-height:1;
  letter-spacing:12px;
  color:var(--gold-lt);
  text-shadow:0 0 60px rgba(201,165,90,.5), 0 2px 6px rgba(0,0,0,.7);
  margin-bottom:20px;
  animation:goldglow 4s ease-in-out infinite alternate;
}
.hero h1{
  font-family:'Playfair Display',serif;
  font-size:30px;
  font-weight:400;
  font-style:italic;
  color:#fff;
  letter-spacing:4px;
  margin-bottom:28px;
}
.hero-rule{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-bottom:24px;
}
.hero-rule-line{
  width:80px; height:1px;
  background:linear-gradient(to right, transparent, rgba(245,228,176,.6));
}
.hero-rule-line:last-child{
  background:linear-gradient(to left, transparent, rgba(245,228,176,.6));
}
.hero-rule-gem{
  width:7px; height:7px;
  background:rgba(245,228,176,.75);
  transform:rotate(45deg);
}
.hero-sub{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:12px;
  letter-spacing:5px;
  text-transform:uppercase;
  color:rgba(255,255,255,.55);
  margin-bottom:54px;
}
.countdown-wrap{
  display:inline-block;
  border:1px solid rgba(201,165,90,.3);
  padding:20px 44px;
  position:relative;
}
/* corner accents */
.countdown-wrap::before,
.countdown-wrap::after{
  content:'✦';
  position:absolute;
  color:var(--gold);
  font-size:10px;
  opacity:.5;
}
.countdown-wrap::before{ top:6px; left:10px; }
.countdown-wrap::after { bottom:6px; right:10px; }
.cd-num{
  font-family:'Playfair Display',serif;
  font-size:72px;
  font-weight:900;
  line-height:1;
  color:var(--gold-lt);
  text-shadow:0 0 30px rgba(201,165,90,.4);
}
.cd-label{
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:5px;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
  margin-top:6px;
}

.scroll-cue{
  position:absolute;
  bottom:34px; left:50%;
  transform:translateX(-50%);
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  opacity:.4;
  animation:bob 2.6s ease-in-out infinite;
}
.scroll-cue span{
  font-family:'Cinzel',serif;
  font-size:7px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold-pale);
}
.scroll-cue svg{ stroke:var(--gold-pale); fill:none; width:16px; }
@keyframes bob{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%    {transform:translateX(-50%) translateY(8px)}
}

/* ═══════════════════════════════════════════
   PROGRAMME / SCRATCH SECTION
═══════════════════════════════════════════ */
.programme-section{
  background:
    radial-gradient(ellipse at 50% -10%, rgba(107,13,18,.6) 0%, transparent 60%),
    var(--ink);
}
.scratch-hint{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:13px;
  letter-spacing:2px;
  color:rgba(245,228,176,.5);
  text-align:center;
  margin-bottom:56px;
  font-style:italic;
}
/* the five cards */
.scratch-grid{
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  justify-content:center;
  max-width:1100px;
  margin:0 auto;
}
.scratch-card{
  width:200px;
  height:200px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  cursor:crosshair;
  flex-shrink:0;
}
/* gold shimmer ring */
.scratch-card::before{
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:50%;
  background:conic-gradient(
    var(--gold-pale) 0deg,
    var(--gold) 60deg,
    var(--gold-lt) 120deg,
    var(--gold-pale) 180deg,
    var(--gold) 240deg,
    var(--gold-lt) 300deg,
    var(--gold-pale) 360deg
  );
  z-index:0;
  animation:spin 8s linear infinite;
}
@keyframes spin{ to{transform:rotate(360deg)} }

.scratch-inner{
  position:absolute;
  inset:3px;
  border-radius:50%;
  background:linear-gradient(145deg, #8b1219, #5b0d10);
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:18px;
  text-align:center;
}
.scratch-inner img{
  width:36px;
  height:36px;
  object-fit:contain;
  margin-bottom:8px;
  filter:brightness(0) invert(1);
  opacity:.85;
}
.scratch-time{
  font-family:'Playfair Display',serif;
  font-size:26px;
  font-style:italic;
  color:var(--gold-lt);
  line-height:1;
  margin-bottom:6px;
}
.scratch-desc{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:11px;
  line-height:1.5;
  color:rgba(245,228,176,.85);
  letter-spacing:.3px;
}
.scratch-card canvas{
  position:absolute;
  inset:3px;
  border-radius:50%;
  z-index:3;
  cursor:crosshair;
}

/* ═══════════════════════════════════════════
   GALLERY
═══════════════════════════════════════════ */
.gallery-section{
  background:
    radial-gradient(ellipse at 50% 100%, rgba(107,13,18,.4) 0%, transparent 55%),
    var(--velvet);
}
/* asymmetric mosaic */
.gallery{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:260px 260px;
  gap:12px;
  max-width:1060px;
  margin:0 auto;
}
.g-item{
  overflow:hidden;
  border-radius:4px;
  position:relative;
}
.g-item::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to top,
    rgba(107,13,18,.55) 0%,
    transparent 55%);
  opacity:0;
  transition:opacity .4s ease;
}
.g-item:hover::after{opacity:1}
.g-item img{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:transform .9s ease;
}
.g-item:hover img{transform:scale(1.07)}
/* gold frame on hover */
.g-item::before{
  content:'';
  position:absolute;
  inset:0;
  border:0px solid var(--gold);
  z-index:2;
  transition:border-width .3s ease;
  pointer-events:none;
}
.g-item:hover::before{border-width:3px}

.g-item:nth-child(1){grid-column:1/7;  grid-row:1}
.g-item:nth-child(2){grid-column:7/10; grid-row:1}
.g-item:nth-child(3){grid-column:10/13;grid-row:1/3}
.g-item:nth-child(4){grid-column:1/5;  grid-row:2}
.g-item:nth-child(5){grid-column:5/10; grid-row:2}

/* ═══════════════════════════════════════════
   MAP
═══════════════════════════════════════════ */
.map-section{
  background:var(--ink);
}
.map-frame{
  max-width:860px;
  margin:0 auto;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 0 0 2px var(--crimson), 0 0 0 5px var(--gold), 0 20px 60px rgba(0,0,0,.5);
  position:relative;
}
.map-frame::before{
  content:'';
  position:absolute;
  inset:-5px;
  border-radius:9px;
  background:
    conic-gradient(from 0deg,
      var(--gold-pale) 0deg, var(--gold) 90deg,
      var(--gold-pale) 180deg, var(--gold) 270deg,
      var(--gold-pale) 360deg);
  z-index:-1;
  opacity:.6;
  animation:spin 12s linear infinite;
}
.map-frame iframe{
  width:100%; height:460px;
  border:0; display:block;
  filter:sepia(.15) contrast(1.05);
}
.map-caption{
  text-align:center;
  margin-top:28px;
  font-family:'Cinzel',serif;
  font-size:10px;
  letter-spacing:5px;
  text-transform:uppercase;
  color:var(--gold);
  opacity:.65;
}

/* ═══════════════════════════════════════════
   RSVP
═══════════════════════════════════════════ */
.rsvp-section{
  background:
    radial-gradient(ellipse at 50% 0%, rgba(107,13,18,.5) 0%, transparent 60%),
    var(--velvet);
}
.rsvp-inner{
  max-width:700px;
  margin:0 auto;
  text-align:center;
}
.rsvp-inner p{
  color:rgba(245,228,176,.55);
  font-weight:200;
  font-size:14px;
  line-height:1.9;
  margin-bottom:42px;
  max-width:460px;
  margin-left:auto;
  margin-right:auto;
  font-style:italic;
}
.rsvp-frame{
  border-radius:6px;
  overflow:hidden;
  border:1px solid rgba(201,165,90,.25);
  box-shadow:0 0 0 3px rgba(107,13,18,.5), 0 20px 60px rgba(0,0,0,.4);
}
.rsvp-frame iframe{
  width:100%; height:680px;
  border:none; display:block;
}

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
footer{
  background:var(--crimson-dk);
  border-top:1px solid rgba(201,165,90,.2);
  padding:70px 24px 50px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
footer::before{
  content:'';
  position:absolute;

.footer-mono{

.footer-date{

/* ═══════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════ */
@media(max-width:768px){

/* ═══════════════════════════════════════════
   RSVP CUSTOM FORM
═══════════════════════════════════════════ */
.rsvp-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,165,90,.2);
  border-radius:8px;
  padding:48px 44px 52px;
  box-shadow:0 0 0 3px rgba(107,13,18,.4),0 24px 70px rgba(0,0,0,.45);
  text-align:left;
  margin-top:8px;
}
.rsvp-field{ margin-bottom:32px; }
.rsvp-field label{
  display:block;
  font-family:'Cinzel',serif;
  font-size:9px; letter-spacing:4px; text-transform:uppercase;
  color:var(--gold); opacity:.8; margin-bottom:10px;
}
.rsvp-field input[type="text"],
.rsvp-field input[type="number"]{
  width:100%;
  background:rgba(255,255,255,.05);
  border:none;
  border-bottom:1px solid rgba(201,165,90,.35);
  color:var(--cream);
  font-family:'Jost',sans-serif; font-weight:300; font-size:15px;
  padding:10px 4px; outline:none;
  transition:border-color .3s;
  border-radius:0; -webkit-appearance:none;
}
.rsvp-field input[type="text"]:focus,
.rsvp-field input[type="number"]:focus{ border-bottom-color:var(--gold-lt); }
.rsvp-field input[type="text"]::placeholder,
.rsvp-field input[type="number"]::placeholder{ color:rgba(245,228,176,.25); }
.rsvp-field input[type="number"]{ -moz-appearance:textfield; }
.rsvp-field input[type="number"]::-webkit-inner-spin-button,
.rsvp-field input[type="number"]::-webkit-outer-spin-button{ -webkit-appearance:none; }
.radio-group{ display:flex; gap:12px; flex-wrap:wrap; }
.radio-pill{ position:relative; }
.radio-pill input{ position:absolute; opacity:0; width:0; height:0; }
.radio-pill label{
  display:inline-block;
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(245,228,176,.6);
  border:1px solid rgba(201,165,90,.3);
  padding:9px 20px; cursor:pointer;
  transition:all .25s ease; margin-bottom:0; opacity:1;
}
.radio-pill input:checked + label{
  background:var(--gold); border-color:var(--gold);
  color:var(--ink); box-shadow:0 0 18px rgba(201,165,90,.35);
}
.radio-pill label:hover{ border-color:var(--gold-lt); color:var(--gold-lt); }
#rsvp-submit{
  width:100%; margin-top:10px;
  background:transparent; border:1px solid var(--gold);
  color:var(--gold-lt);
  font-family:'Cinzel',serif; font-size:11px; letter-spacing:5px; text-transform:uppercase;
  padding:16px 32px; cursor:pointer;
  position:relative; overflow:hidden; transition:color .3s;
}
#rsvp-submit::before{
  content:''; position:absolute; inset:0;
  background:var(--gold); transform:scaleX(0);
  transform-origin:left; transition:transform .4s ease; z-index:0;
}
#rsvp-submit:hover::before{ transform:scaleX(1); }
#rsvp-submit:hover{ color:var(--ink); }
#rsvp-submit span{ position:relative; z-index:1; }
#rsvp-submit:disabled{ opacity:.5; cursor:not-allowed; }
#rsvp-submit:disabled::before{ transform:scaleX(0) !important; }
#rsvp-status{
  margin-top:28px; font-family:'Jost',sans-serif;
  font-size:13px; font-weight:300; font-style:italic;
  text-align:center; min-height:20px; transition:opacity .4s;
}
#rsvp-status.success{ color:var(--gold-lt); }
#rsvp-status.error  { color:#e88a8a; }
@media(max-width:768px){
  .rsvp-card{ padding:28px 20px 32px; }
  .radio-group{ flex-direction:column; gap:10px; }
}

}
#ed-apply{
  flex:1;
  background:var(--gold); border:none;

  font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; text-transform:uppercase;
  padding:13px;

  transition:background .25s;

}

#ed-reset{
  background:none;
  border:1px solid rgba(201,165,90,.3);
  color:rgba(245,228,176,.5);
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; text-transform:uppercase;
  padding:13px 18px;
  cursor:pointer;
  transition:border-color .2s, color .2s;
  border-radius:2px;
}
#ed-reset:hover{ border-color:var(--gold); color:var(--gold-lt); }

#ed-saved{
  text-align:center;
  font-family:'Jost',sans-serif; font-size:11px; font-style:italic;
  color:var(--gold-lt); opacity:0;
  transition:opacity .4s;
  padding:6px 0 0;
  flex-basis:100%;
}
#ed-saved.show{ opacity:1; }

</style>

<body>

<!-- AMBIENT LIGHTS -->

<!-- PARTICLES -->

<!-- ══════════ CURTAIN ══════════ -->

<!-- ══════════ HERO ══════════ -->
<div class="hero">

  <div class="hero-vignette"></div>
  <div class="spotlight"></div>

    <p class="hero-program" id="hero-program"></p>

<script>

/* ── RENDER CONFIG ─────────────────────────────────────────
   Čita CONFIG objekat i upisuje sve vrednosti u DOM.
   Ne diraj ovo osim ako ne znaš šta radiš.
───────────────────────────────────────────────────────────── */
(function renderConfig(){
  const C = CONFIG;
  const mono  = C.monogram1 + " & " + C.monogram2;
  const names = C.ime1 + " & " + C.ime2;

  // <title> i meta tagovi
  document.getElementById("page-title").textContent = names + " · " + C.datumPrikaz;
  const setMeta = (id, val) => { const el = document.getElementById(id); if(el) el.setAttribute("content", val); };
  const ogDesc = "Позивамо вас да прославите овај посебан дан са нама у " + C.grad + ".";
  setMeta("og-title",    names + " · " + C.datumPrikaz);
  setMeta("og-desc",     ogDesc);
  setMeta("og-image",    C.ogSlika);
  setMeta("og-imagealt", names + " — венчање " + C.datumPrikaz);
  setMeta("tw-title",    names + " · " + C.datumPrikaz);
  setMeta("tw-desc",     ogDesc);
  setMeta("tw-image",    C.ogSlika);

/* ── PARTICLES ── */
const pCanvas = document.getElementById("particles");
const pctx    = pCanvas.getContext("2d");
function resizeP(){ pCanvas.width = innerWidth; pCanvas.height = innerHeight; }
resizeP();
window.addEventListener("resize", resizeP);

function launchParticles(cx, cy){
  const particles = [];
  const colors = ["rgba(201,165,90,", "rgba(245,228,176,", "rgba(255,210,100,"];
  for(let i = 0; i < 180; i++){
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 8 + 2;
    particles.push({
      x: cx, y: cy,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed - Math.random() * 3,
      size: Math.random() * 5 + 2,
      life: 100 + Math.random() * 60,
      maxLife: 160,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random() * Math.PI * 2,
      rSpeed: (Math.random() - .5) * .2,
      shape: Math.random() > .5 ? "circle" : "diamond"
    });
  }
  function animP(){
    pctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    let alive = false;
    for(const p of particles){
      if(p.life <= 0) continue;
      alive = true;
      p.x  += p.dx;
      p.y  += p.dy;
      p.dy += .12;
      p.life--;
      p.rot += p.rSpeed;
      const alpha = p.life / p.maxLife;
      pctx.save();
      pctx.globalAlpha = alpha;
      pctx.translate(p.x, p.y);
      pctx.rotate(p.rot);
      pctx.fillStyle = p.color + alpha + ")";
      if(p.shape === "diamond"){
        pctx.beginPath();
        pctx.moveTo(0, -p.size);
        pctx.lineTo(p.size, 0);
        pctx.lineTo(0, p.size);
        pctx.lineTo(-p.size, 0);
        pctx.closePath();
        pctx.fill();
      } else {
        pctx.beginPath();
        pctx.arc(0, 0, p.size/2, 0, Math.PI*2);
        pctx.fill();
      }
      pctx.restore();
    }
    if(alive) requestAnimationFrame(animP);
  }
  animP();
}

/* ── SCRATCH CARDS ── */
function initScratchCards(){
document.querySelectorAll(".scratch-card").forEach(card => {
  const canvas = card.querySelector("canvas");
  const ctx    = canvas.getContext("2d");
  let isDown   = false;
  let scratchedPx = 0;
  let revealed    = false;

  function setup(){
    canvas.width  = card.offsetWidth  - 6;
    canvas.height = card.offsetHeight - 6;
    // gold scratch layer with texture
    const grad = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, canvas.width/2
    );
    grad.addColorStop(0,   "#e8c97a");
    grad.addColorStop(0.5, "#c9a55a");
    grad.addColorStop(1,   "#a0783a");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, Math.PI*2);
    ctx.fill();
    // scratchy text hint
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(0,0,0,.2)";
    ctx.font = "bold 11px 'Cinzel', serif";
    ctx.textAlign = "center";
    ctx.fillText("ОГРЕБИ", canvas.width/2, canvas.height/2 - 6);
    ctx.fillText("✦", canvas.width/2, canvas.height/2 + 14);
    ctx.globalCompositeOperation = "destination-out";
  }
  setup();

  function doScratch(x, y){
    ctx.beginPath();
    ctx.arc(x, y, 22, 0, Math.PI*2);
    ctx.fill();

    // check coverage
    if(!revealed){
      const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
      let transparent = 0;
      for(let i = 3; i < data.length; i += 4) if(data[i] < 128) transparent++;
      const pct = transparent / (canvas.width * canvas.height);
      if(pct > .55){
        revealed = true;
        canvas.style.transition = "opacity .6s ease";
        canvas.style.opacity = "0";
        // burst
        const r = card.getBoundingClientRect();
        launchParticles(r.left + r.width/2, r.top + r.height/2);
      }
    }
  }

  canvas.addEventListener("mousedown", () => isDown = true);
  window.addEventListener("mouseup",   () => isDown = false);
  canvas.addEventListener("mousemove", e => {
    if(!isDown) return;
    const r = canvas.getBoundingClientRect();
    doScratch(e.clientX - r.left, e.clientY - r.top);
  });
  canvas.addEventListener("touchstart", e => {
    isDown = true;
    document.body.style.overflow = "hidden";
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener("touchend", () => {
    isDown = false;
    document.body.style.overflow = "";
  });
  canvas.addEventListener("touchmove", e => {
    if(!isDown) return;
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    doScratch(t.clientX - r.left, t.clientY - r.top);
  }, {passive:false});
});
} // end initScratchCards
initScratchCards();

/* ══════════════════════════════════════════
   SUBTLE SOUND ENGINE  — Web Audio API
   Soft, ambient, non-intrusive
══════════════════════════════════════════ */
let _ac = null;
function ac(){
  if(!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if(_ac.state === "suspended") _ac.resume();
  return _ac;
}
function out(vol = 0.18){
  const g = ac().createGain();
  g.gain.value = vol;
  g.connect(ac().destination);
  return g;
}

/* 1. Curtain open — very soft low whoosh, barely felt */
function sfxCurtain(){
  const a = ac(), o = out(0.12);
  const buf = a.createBuffer(1, a.sampleRate * 2, a.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < d.length; i++)
    d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.2);
  const src = a.createBufferSource(); src.buffer = buf;
  const lp = a.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value = 180;
  const g = a.createGain();
  g.gain.setValueAtTime(0, a.currentTime);
  g.gain.linearRampToValueAtTime(1, a.currentTime + 0.3);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 2);
  src.connect(lp); lp.connect(g); g.connect(o);
  src.start();
}

/* 2. Hero reveal — single soft sine bell tone, fades in gently */
function sfxHero(){
  const a = ac(), o = out(0.10);
  [440, 660].forEach((freq, i) => {
    const osc = a.createOscillator();
    osc.type = "sine"; osc.frequency.value = freq;
    const g = a.createGain();
    const t = a.currentTime + i * 0.18;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.5, t + 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
    osc.connect(g); g.connect(o);
    osc.start(t); osc.stop(t + 2);
  });
}

/* 3. Scratch — very faint high-frequency brush noise, throttled */
let _lastScratch = 0;
function sfxScratch(){
  const now = performance.now();
  if(now - _lastScratch < 90) return;
  _lastScratch = now;
  const a = ac(), o = out(0.09);

  // Soft sand-paper rasp: shaped noise through a gentle bandpass
  // sounds like gold foil being rubbed, not harsh vinyl
  const dur = 0.055;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < d.length; i++){
    // smoother noise — average two random samples to reduce harshness
    d[i] = ((Math.random() + Math.random()) - 1) * Math.pow(1 - i/d.length, 0.4);
  }
  const src = a.createBufferSource();
  src.buffer = buf;
  // slightly different pitch each stroke so it feels natural
  src.playbackRate.value = 0.85 + Math.random() * 0.3;

  // warm bandpass: 600–1800 Hz — papery, not scratchy-harsh
  const bp = a.createBiquadFilter();
  bp.type = "bandpass";
  bp.frequency.value = 900 + Math.random() * 400;
  bp.Q.value = 1.2;

  // gentle low-shelf to remove any thin high-end bite
  const shelf = a.createBiquadFilter();
  shelf.type = "highshelf";
  shelf.frequency.value = 3200;
  shelf.gain.value = -9;

  const g = a.createGain();
  g.gain.setValueAtTime(0, a.currentTime);
  g.gain.linearRampToValueAtTime(1, a.currentTime + 0.008);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);

  src.connect(bp); bp.connect(shelf); shelf.connect(g); g.connect(o);
  src.start();
}

/* 4. Card reveal — magical shimmer: rising sparkle arpeggio + fairy dust noise burst */
function sfxReveal(){
  const a = ac(), o = out(0.16);

  // ── fairy dust: pitched noise that sweeps upward ──
  const noiseDur = 1.6;
  const nbuf = a.createBuffer(1, Math.floor(a.sampleRate * noiseDur), a.sampleRate);
  const nd = nbuf.getChannelData(0);
  for(let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1) * Math.pow(1-i/nd.length, 1.8);
  const nsrc = a.createBufferSource(); nsrc.buffer = nbuf;
  const nbp = a.createBiquadFilter(); nbp.type="bandpass";
  nbp.frequency.setValueAtTime(800, a.currentTime);
  nbp.frequency.exponentialRampToValueAtTime(4200, a.currentTime + 1.4);
  nbp.Q.value = 3;
  const ng = a.createGain();
  ng.gain.setValueAtTime(0, a.currentTime);
  ng.gain.linearRampToValueAtTime(0.55, a.currentTime + 0.06);
  ng.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 1.5);
  nsrc.connect(nbp); nbp.connect(ng); ng.connect(o);
  nsrc.start();

  // ── rising magical arpeggio — pentatonic, wide spacing ──
  // notes: D5  F#5  A5  D6  F#6  A6
  const freqs = [587.33, 739.99, 880.00, 1174.66, 1479.98, 1760.00];
  freqs.forEach((freq, i) => {
    const osc  = a.createOscillator();
    const osc2 = a.createOscillator(); // octave up for shimmer
    osc.type  = "sine"; osc.frequency.value  = freq;
    osc2.type = "sine"; osc2.frequency.value = freq * 2;

    const t = a.currentTime + i * 0.075; // quick stagger upward

    const g = a.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.28 - i*0.03, t + 0.018);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.1 - i*0.06);

    const g2 = a.createGain(); g2.gain.value = 0.18; // octave quieter

    // slight vibrato via LFO on higher notes
    if(i >= 3){
      const lfo = a.createOscillator(); lfo.frequency.value = 5.5 + i;
      const lfoG = a.createGain(); lfoG.gain.value = 6;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      lfo.start(t); lfo.stop(t + 1.2);
    }

    osc.connect(g); osc2.connect(g2); g2.connect(g); g.connect(o);
    osc.start(t);  osc.stop(t + 1.2);
    osc2.start(t); osc2.stop(t + 1.2);
  });

  // ── final high sparkle ping ──
  setTimeout(()=>{
    const a2 = ac(), o2 = out(0.08);
    const ping = a2.createOscillator();
    ping.type = "sine"; ping.frequency.setValueAtTime(2637, a2.currentTime);
    ping.frequency.exponentialRampToValueAtTime(1800, a2.currentTime + 0.5);
    const pg = a2.createGain();
    pg.gain.setValueAtTime(0.5, a2.currentTime);
    pg.gain.exponentialRampToValueAtTime(0.001, a2.currentTime + 0.5);
    ping.connect(pg); pg.connect(o2);
    ping.start(); ping.stop(a2.currentTime + 0.55);
  }, 460);
}

/* 5. Gallery hover — single barely-audible high tick */
let _lastHover = 0;
function sfxHover(){
  const now = performance.now();
  if(now - _lastHover < 500) return;
  _lastHover = now;
  const a = ac(), o = out(0.05);
  const osc = a.createOscillator();
  osc.type = "sine"; osc.frequency.value = 1760;
  const g = a.createGain();
  g.gain.setValueAtTime(0.3, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.12);
  osc.connect(g); g.connect(o);
  osc.start(); osc.stop(a.currentTime + 0.14);
}

/* ── RSVP submit → Google Sheets via Apps Script ── */
const APPS_SCRIPT_URL = CONFIG.appsScriptUrl;

function submitRSVP(){
  const name    = document.getElementById("rsvp-name").value.trim();
  const checked = document.querySelector('input[name="dolazak"]:checked');
  const btn     = document.getElementById("rsvp-submit");

  if(!name){    showStatus("Молимо унесите своје име и презиме.", "error"); return; }
  if(!checked){ showStatus("Молимо одаберите да ли долазите.",   "error"); return; }

  const dolazak = checked.value;
  const guests  = dolazak === "Да"
    ? (parseInt(document.getElementById("rsvp-guests").value) || 1)
    : 0;

  // Build JSON with exact Cyrillic keys your doPost expects
  const payload = JSON.stringify({
    "Име и презиме": name,
    "Долазак":       dolazak,
    "Број гостију":  guests
    // "Датум" is set by the Sheet via new Date() in the Script — no need to send it
  });

  btn.disabled = true;
  showStatus("Слање...", "");

  // Apps Script requires no-cors — we cannot read the response body,
  // but the data arrives in the Sheet as long as the request reaches the server.
  fetch(APPS_SCRIPT_URL, {
    method:  "POST",
    mode:    "no-cors",
    headers: { "Content-Type": "text/plain" }, // text/plain bypasses CORS preflight
    body:    payload
  })
  .then(() => {
    showStatus("✦  Хвала! Ваш одговор је забележен.  ✦", "success");
    btn.disabled = false;
    const r = btn.getBoundingClientRect();
    launchParticles(r.left + r.width/2, r.top);
    setTimeout(resetRSVP, 5000);
  })
  .catch(() => {
    showStatus("Дошло је до грешке. Покушајте поново.", "error");
    btn.disabled = false;
  });
}

function showStatus(msg, type){
  const el = document.getElementById("rsvp-status");
  el.textContent = msg;
  el.className   = type;
}

function resetRSVP(){
  document.getElementById("rsvp-name").value = "";
  document.querySelectorAll('input[name="dolazak"]').forEach(r => r.checked = false);
  document.getElementById("rsvp-guests").value = "";
  document.getElementById("guests-field").style.display = "none";
  document.getElementById("rsvp-status").textContent = "";
  document.getElementById("rsvp-status").className = "";
}

<script>
/* ══════════════════════════════════════════
   EDITOR PANEL
══════════════════════════════════════════ */
(function(){
  const toggle = document.getElementById("ed-toggle");
  const panel  = document.getElementById("ed-panel");
  const close  = document.getElementById("ed-close");
  const applyBtn = document.getElementById("ed-apply");
  const resetBtn = document.getElementById("ed-reset");
  const saved  = document.getElementById("ed-saved");

  toggle.addEventListener("click", () => {
    panel.classList.toggle("open");
    if(panel.classList.contains("open")) populateEditor();
  });
  close.addEventListener("click",  () => panel.classList.remove("open"));
  document.addEventListener("keydown", e => { if(e.key==="Escape") panel.classList.remove("open"); });

  function val(id){ const el=document.getElementById(id); return el?el.value.trim():""; }
  function setValue(id,v){ const el=document.getElementById(id); if(el) el.value=v||""; }

  function populateEditor(){
    const C = CONFIG;
    setValue("ed-ime1",     C.ime1);
    setValue("ed-ime2",     C.ime2);
    setValue("ed-mon1",     C.monogram1);
    setValue("ed-mon2",     C.monogram2);
    setValue("ed-datumP",   C.datumPrikaz);
    setValue("ed-datumB",   C.datumBrojac);
    setValue("ed-grad",     C.grad);
    setValue("ed-drzava",   C.drzava);
    setValue("ed-csub",     C.curtainSub);
    setValue("ed-mapsNaziv",C.mapsNaziv);
    setValue("ed-mapsUrl",  C.mapsUrl);
    setValue("ed-rsvpRok",  C.rsvpRok);
    setValue("ed-appsUrl",  C.appsScriptUrl);
    setValue("ed-ogSlika",  C.ogSlika);

    document.querySelectorAll("#ed-satnica .ed-satnica-card").forEach((card,i) => {
      const item = C.satnica[i]||{};
      card.querySelector(".sc-vreme").value = item.vreme||"";
      card.querySelector(".sc-opis").value  = (item.opis||"").replace(/<br>/g,"\n");
      card.querySelectorAll(".ed-icon-opt").forEach(btn => {
        btn.classList.toggle("selected", btn.dataset.icon===item.icon);
      });
    });
  }

  // icon click
  document.querySelectorAll(".ed-icon-opt").forEach(btn => {
    btn.addEventListener("click", () => {
      btn.closest(".ed-icon-select").querySelectorAll(".ed-icon-opt").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
    });
  });

  applyBtn.addEventListener("click", () => {
    CONFIG.ime1          = val("ed-ime1");
    CONFIG.ime2          = val("ed-ime2");
    CONFIG.monogram1     = val("ed-mon1");
    CONFIG.monogram2     = val("ed-mon2");
    CONFIG.datumPrikaz   = val("ed-datumP");
    CONFIG.datumBrojac   = val("ed-datumB");
    CONFIG.grad          = val("ed-grad");
    CONFIG.drzava        = val("ed-drzava");
    CONFIG.curtainSub    = val("ed-csub");
    CONFIG.mapsNaziv     = val("ed-mapsNaziv");
    CONFIG.mapsUrl       = val("ed-mapsUrl");
    CONFIG.rsvpRok       = val("ed-rsvpRok");
    CONFIG.appsScriptUrl = val("ed-appsUrl");
    CONFIG.ogSlika       = val("ed-ogSlika");

    document.querySelectorAll("#ed-satnica .ed-satnica-card").forEach((card,i) => {
      const selIcon = card.querySelector(".ed-icon-opt.selected");
      CONFIG.satnica[i] = {
        vreme: card.querySelector(".sc-vreme").value.trim(),
        opis:  card.querySelector(".sc-opis").value.trim().replace(/\n/g,"<br>"),
        icon:  selIcon ? selIcon.dataset.icon : (CONFIG.satnica[i]||{}).icon,
      };
    });

    reRender();
    saved.classList.add("show");
    setTimeout(()=>saved.classList.remove("show"), 2500);
  });

  resetBtn.addEventListener("click", populateEditor);

  function reRender(){
    const C = CONFIG;
    const names = C.ime1 + " & " + C.ime2;

    document.getElementById("page-title").textContent = names+" · "+C.datumPrikaz;
    document.getElementById("curtain-mono").innerHTML  = C.monogram1+" &amp; "+C.monogram2;
    document.getElementById("curtain-sub").textContent = C.curtainSub;
    document.getElementById("open-btn").textContent    = C.curtainBtn;
    document.getElementById("hero-program").innerHTML  = C.datumPrikaz+" &nbsp;·&nbsp; "+C.grad;
    document.getElementById("hero-monogram").innerHTML = C.monogram1+" &amp; "+C.monogram2;
    document.getElementById("hero-h1").innerHTML       = C.ime1+" &amp; "+C.ime2;
    document.getElementById("hero-sub").innerHTML      = C.grad+" &nbsp;·&nbsp; "+C.drzava;
    document.getElementById("map-iframe").src          = C.mapsUrl;
    document.getElementById("map-caption").innerHTML   = C.mapsNaziv+" &nbsp;·&nbsp; "+C.grad;
    document.getElementById("rsvp-intro").innerHTML    =
      "Молимо вас да потврдите долазак најкасније до "+C.rsvpRok+
      "<br>Радујемо се да прославимо овај дан заједно са вама.";
    document.getElementById("footer-mono").innerHTML = C.monogram1+" &amp; "+C.monogram2;
    document.getElementById("footer-date").innerHTML = C.datumPrikaz+" &nbsp;·&nbsp; "+C.grad;

    // rebuild scratch grid
    const grid = document.getElementById("scratch-grid");
    grid.innerHTML = "";
    C.satnica.forEach(item => {
      const card = document.createElement("div");
      card.className = "scratch-card in-view";
      card.innerHTML =
        `<div class="scratch-inner">` +
          `<img src="icons/${item.icon}.png" alt="">` +
          `<div class="scratch-time">${item.vreme}</div>` +
          `<div class="scratch-desc">${item.opis}</div>` +
        `</div><canvas></canvas>`;
      grid.appendChild(card);
    });
    initScratchCards();
  }

})();
</script>
